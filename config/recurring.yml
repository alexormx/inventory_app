# Solid Queue Recurring Tasks Configuration
# These tasks run automatically on the specified schedule
#
# Cron syntax: "minute hour day month weekday"
# Examples:
#   "0 4 * * *"     = Every day at 4:00 AM
#   "*/30 * * * *"  = Every 30 minutes
#   "0 */6 * * *"   = Every 6 hours
#   "0 4 * * 1"     = Every Monday at 4:00 AM

production:
  # Sitemap served dynamically from /sitemap.xml
  suppliers_hlj_tomica_recent_additions_daily:
    class: Suppliers::Hlj::TomicaRecentAdditionsJob
    schedule: "0 5 * * *"

  suppliers_hlj_tomica_recent_arrivals_daily:
    class: Suppliers::Hlj::TomicaRecentArrivalsJob
    schedule: "30 5 * * *"

  suppliers_hlj_weekly_discovery:
    class: Suppliers::Hlj::WeeklyDiscoveryJob
    schedule: "0 6 * * 1"

  suppliers_takara_tomy_mall_weekly_backfill:
    class: Suppliers::TakaraTomyMall::WeeklyBackfillJob
    schedule: "30 6 * * 1"

  suppliers_tomica_fandom_weekly_backfill:
    class: Suppliers::TomicaFandom::WeeklyBackfillJob
    schedule: "0 7 * * 1"

development:
  # No recurring sitemap generation

test:
  # No recurring tasks in test environment
